name: Deploy Cloudflare Worker + Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'worker.js'
      - 'wrangler.jsonc'
      - '_headers'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Deploy wrangler directly — no wrangler-action wrapper (it fails to forward
      # the API token when wranglerVersion is overridden to v4).
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy worker.js
