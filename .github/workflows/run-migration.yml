name: Run DB Migration

# One-shot migration runner. Applies supabase/migrations/001_dedup_perf_blacklist.sql
# to the live database via the Supabase Management API using the existing
# SUPABASE_ACCESS_TOKEN secret. Triggers automatically when this file changes on main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-migration.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          echo "=== Applying 001_dedup_perf_blacklist.sql ==="
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/001_dedup_perf_blacklist.sql').read()}))")
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "HTTP $CODE"
          echo "$BODY"
          if [ "$CODE" -ge 300 ]; then
            echo "::error::Migration failed (HTTP $CODE)"
            exit 1
          fi

          echo ""
          echo "=== Verify: new columns exist ==="
          q() {
            curl -sf -X POST \
              "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$1\"}"
          }
          q "SELECT column_name FROM information_schema.columns WHERE table_name='leads' AND column_name IN ('domain_normalized','extract_attempts','source') ORDER BY 1;"; echo ""
          echo "--- leads count after dedup ---"
          q "SELECT count(*) AS total, count(domain_normalized) AS with_domain FROM leads;"; echo ""
          echo "--- login_attempts table ---"
          q "SELECT count(*) AS rows FROM login_attempts;"; echo ""
          echo "✅ Migration applied"
