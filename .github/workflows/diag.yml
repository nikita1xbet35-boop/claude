name: DB Diagnostics

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostic queries
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          API="https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query"
          q() {
            echo "===== $1 ====="
            curl -sf -X POST "$API" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$2\"}" || echo "(query failed)"
            echo ""
          }
          q "send_queue status breakdown"            "SELECT status, count(*) FROM public.send_queue GROUP BY status ORDER BY 2 DESC;"
          q "send_queue pending soonest 8"           "SELECT id, scheduled_at, brand, gmail_account FROM public.send_queue WHERE status='pending' ORDER BY scheduled_at ASC LIMIT 8;"
          q "send_queue failed error reasons"        "SELECT COALESCE(error,'(null)') AS error, count(*) FROM public.send_queue WHERE status IN ('failed','skipped') GROUP BY 1 ORDER BY 2 DESC LIMIT 20;"
          q "email_log total + today"                "SELECT (SELECT count(*) FROM public.email_log) AS total, (SELECT count(*) FROM public.email_log WHERE sent_at >= (now() AT TIME ZONE 'UTC')::date) AS today_utc;"
          q "email_log last 5"                       "SELECT sent_at, email, brand, gmail_account FROM public.email_log ORDER BY sent_at DESC LIMIT 5;"
          q "leads stage breakdown"                  "SELECT stage, count(*) FROM public.leads GROUP BY stage ORDER BY 2 DESC;"
          q "leads contact_email_type breakdown"     "SELECT COALESCE(contact_email_type,'(null)') AS t, count(*) FROM public.leads GROUP BY 1 ORDER BY 2 DESC;"
          q "leads new WITH contact_email"           "SELECT count(*) FROM public.leads WHERE stage='new' AND contact_email IS NOT NULL AND contact_email <> '';"
          q "leads new pending contact extraction"   "SELECT count(*) FROM public.leads WHERE contact_email IS NULL AND contact_email_type IS NULL AND stage <> 'excluded';"
          q "api_usage"                              "SELECT service, used, limit_value, paused, system_paused FROM public.api_usage ORDER BY service;"
          q "error_log last 20"                      "SELECT created_at, level, service, left(message,160) AS msg FROM public.error_log ORDER BY created_at DESC LIMIT 20;"
          q "recent lead names (binary-code check)"  "SELECT left(name,80) AS name, left(url,60) AS url FROM public.leads ORDER BY created_at DESC LIMIT 20;"
          q "leads brand breakdown"                  "SELECT brand, count(*) FROM public.leads GROUP BY brand ORDER BY 2 DESC;"
