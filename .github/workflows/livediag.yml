name: Live DB Diagnostic
on:
  push:
    paths: ['.github/workflows/livediag.yml']
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set +e
          PROJECT=lxsyrserfuighwxuymgb
          BASE="https://api.supabase.com/v1/projects/$PROJECT/database/query"
          AUTH="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

          q() {
            curl -s -X POST "$BASE" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$1\"}" 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "(no data)"
          }

          echo "=== API USAGE ==="
          q "SELECT service, used, limit_value, paused, system_paused FROM api_usage ORDER BY service;"

          echo ""
          echo "=== SEND QUEUE COUNTS ==="
          q "SELECT status, COUNT(*) as cnt FROM send_queue GROUP BY status ORDER BY status;"

          echo ""
          echo "=== LEADS AVAILABLE (active stages, has email) ==="
          q "SELECT stage, COUNT(*) as cnt FROM leads WHERE contact_email IS NOT NULL AND stage IN ('new','ready','researched','followup') GROUP BY stage ORDER BY stage;"

          echo ""
          echo "=== ALL LEADS BY STAGE (has email) ==="
          q "SELECT stage, COUNT(*) as cnt FROM leads WHERE contact_email IS NOT NULL GROUP BY stage ORDER BY cnt DESC;"

          echo ""
          echo "=== LAST 10 FIND-AND-QUEUE LOGS ==="
          q "SELECT created_at, level, message FROM error_log WHERE service='find-and-queue' ORDER BY created_at DESC LIMIT 10;"

          echo ""
          echo "=== LAST 10 GENERATE-QUEUE LOGS ==="
          q "SELECT created_at, level, message FROM error_log WHERE service='generate-queue' ORDER BY created_at DESC LIMIT 10;"

          echo ""
          echo "=== LAST 10 PROCESS-QUEUE LOGS ==="
          q "SELECT created_at, level, message FROM error_log WHERE service='process-queue' ORDER BY created_at DESC LIMIT 10;"

          echo ""
          echo "=== LAST 5 EXTRACT-CONTACTS LOGS ==="
          q "SELECT created_at, level, message FROM error_log WHERE service='extract-contacts' ORDER BY created_at DESC LIMIT 5;"

          echo ""
          echo "=== LAST 5 CHECK-LIMITS LOGS ==="
          q "SELECT created_at, level, message FROM error_log WHERE service='check-limits' ORDER BY created_at DESC LIMIT 5;"

          echo ""
          echo "=== LAST 10 SENT (send_queue joined leads) ==="
          q "SELECT sq.created_at, l.contact_email, sq.brand, sq.status FROM send_queue sq JOIN leads l ON sq.lead_id=l.id WHERE sq.status='sent' ORDER BY sq.created_at DESC LIMIT 10;"

          echo ""
          echo "=== SEND_QUEUE TABLE COLUMNS ==="
          q "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='send_queue' ORDER BY ordinal_position;"

          exit 0
