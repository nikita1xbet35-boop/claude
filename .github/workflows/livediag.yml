name: Live DB Diagnostic
on:
  push:
    paths: ['.github/workflows/livediag.yml']
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT=lxsyrserfuighwxuymgb
          BASE="https://api.supabase.com/v1/projects/$PROJECT/database/query"
          AUTH="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

          run_query() {
            curl -sf -X POST "$BASE" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$1\"}" 2>&1
          }

          echo "=== API USAGE ==="
          run_query "SELECT service, used, limit_value, paused, system_paused FROM api_usage ORDER BY service;" | python3 -m json.tool

          echo ""
          echo "=== SEND QUEUE COUNTS ==="
          run_query "SELECT status, COUNT(*) as cnt FROM send_queue GROUP BY status ORDER BY status;" | python3 -m json.tool

          echo ""
          echo "=== LAST 5 SENT EMAILS ==="
          run_query "SELECT created_at, to_email, brand FROM email_log ORDER BY created_at DESC LIMIT 5;" | python3 -m json.tool

          echo ""
          echo "=== TODAY SENT EMAILS COUNT ==="
          run_query "SELECT COUNT(*) as today_sent FROM email_log WHERE created_at >= CURRENT_DATE;" | python3 -m json.tool

          echo ""
          echo "=== LEADS AVAILABLE ==="
          run_query "SELECT stage, COUNT(*) as cnt FROM leads WHERE contact_email IS NOT NULL AND stage IN ('new','ready','researched','followup') GROUP BY stage ORDER BY stage;" | python3 -m json.tool

          echo ""
          echo "=== LAST 10 FIND-AND-QUEUE LOGS ==="
          run_query "SELECT created_at, level, message FROM error_log WHERE service='find-and-queue' ORDER BY created_at DESC LIMIT 10;" | python3 -m json.tool

          echo ""
          echo "=== LAST 10 GENERATE-QUEUE LOGS ==="
          run_query "SELECT created_at, level, message FROM error_log WHERE service='generate-queue' ORDER BY created_at DESC LIMIT 10;" | python3 -m json.tool

          echo ""
          echo "=== LAST 10 PROCESS-QUEUE LOGS ==="
          run_query "SELECT created_at, level, message FROM error_log WHERE service='process-queue' ORDER BY created_at DESC LIMIT 10;" | python3 -m json.tool

          echo ""
          echo "=== PENDING QUEUE ITEMS (first 10) ==="
          run_query "SELECT sq.id, sq.brand, sq.gmail_account, sq.scheduled_at, l.contact_email FROM send_queue sq JOIN leads l ON sq.lead_id=l.id WHERE sq.status='pending' ORDER BY sq.scheduled_at ASC LIMIT 10;" | python3 -m json.tool

          echo ""
          echo "=== EXTRACT-CONTACTS LAST 5 LOGS ==="
          run_query "SELECT created_at, level, message FROM error_log WHERE service='extract-contacts' ORDER BY created_at DESC LIMIT 5;" | python3 -m json.tool
