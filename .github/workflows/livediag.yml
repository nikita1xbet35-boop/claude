name: Pipeline Health

# Watchdog for the AffiliateOS pipeline. Runs every 30 min, prints a health
# snapshot, and FAILS (red X + GitHub notification) when the system needs
# attention — reserve of contactable leads too low, or the pipeline stalled.
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/livediag.yml'

# Thresholds — tune here.
env:
  MIN_RESERVE: '3'        # alert if fewer than this many contactable leads are waiting
  MIN_NEW_LEADS_1H: '1'   # alert if zero leads were added in the last hour (pipeline stalled)

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Query live DB + evaluate health
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set +e
          q() {
            curl -sf -X POST \
              "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$1\"}"
          }

          echo "=== SEND_QUEUE BY STATUS ==="
          q "SELECT status, count(*) FROM send_queue GROUP BY status ORDER BY count DESC;"; echo ""

          RESERVE_JSON=$(q "SELECT count(*) AS n FROM leads l WHERE l.contact_email IS NOT NULL AND l.stage IN ('new','ready','researched','followup') AND NOT EXISTS (SELECT 1 FROM email_log e WHERE e.email = l.contact_email);")
          RESERVE=$(echo "$RESERVE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['n'])" 2>/dev/null || echo 0)
          echo "=== CONTACTABLE RESERVE: $RESERVE ==="

          SENT_JSON=$(q "SELECT count(*) AS n FROM email_log WHERE sent_at >= (now() AT TIME ZONE 'UTC' + interval '3 hours')::date - interval '3 hours';")
          SENT=$(echo "$SENT_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['n'])" 2>/dev/null || echo 0)
          echo "=== SENT TODAY (GMT+3): $SENT ==="

          LEADS_JSON=$(q "SELECT count(*) AS n, count(contact_email) AS e FROM leads WHERE created_at > now() - interval '60 minutes';")
          NEW1H=$(echo "$LEADS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['n'])" 2>/dev/null || echo 0)
          EMAIL1H=$(echo "$LEADS_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['e'])" 2>/dev/null || echo 0)
          echo "=== LEADS LAST 60 MIN: $NEW1H new / $EMAIL1H with email ==="

          echo ""
          echo "=== LAST 8 find-and-queue RUNS ==="
          q "SELECT created_at, message FROM error_log WHERE service='find-and-queue' ORDER BY created_at DESC LIMIT 8;"; echo ""

          echo ""
          echo "=== SENT TODAY BY HOUR (GMT+3) ==="
          q "SELECT to_char(sent_at + interval '3 hours', 'HH24') AS hour_gmt3, count(*) FROM email_log WHERE sent_at >= (now() AT TIME ZONE 'UTC' + interval '3 hours')::date - interval '3 hours' GROUP BY 1 ORDER BY 1;"; echo ""

          echo ""
          echo "=== NEXT 10 PENDING IN SEND_QUEUE ==="
          q "SELECT sq.scheduled_at, sq.retry_count, l.contact_email IS NOT NULL AS has_email FROM send_queue sq LEFT JOIN leads l ON l.id = sq.lead_id WHERE sq.status = 'pending' ORDER BY sq.scheduled_at ASC LIMIT 10;"; echo ""

          echo ""
          echo "=== FAIL/SKIP REASONS (24h) ==="
          q "SELECT status, error, count(*) FROM send_queue WHERE status IN ('failed','skipped') GROUP BY 1,2 ORDER BY 3 DESC LIMIT 12;"; echo ""

          echo ""
          echo "=== API USAGE / LIMITS / PAUSE FLAGS ==="
          q "SELECT service, used, limit_value, paused, system_paused FROM api_usage ORDER BY service;"; echo ""

          echo ""
          echo "=== LEADS ADDED TODAY (GMT+3): total / with email ==="
          q "SELECT count(*) AS total, count(contact_email) AS with_email FROM leads WHERE created_at >= (now() AT TIME ZONE 'UTC' + interval '3 hours')::date - interval '3 hours';"; echo ""

          echo ""
          echo "=== LAST 10 process-queue RUNS ==="
          q "SELECT created_at, message FROM error_log WHERE service='process-queue' ORDER BY created_at DESC LIMIT 10;"; echo ""

          echo ""
          echo "=== LAST 6 generate-queue RUNS ==="
          q "SELECT created_at, message FROM error_log WHERE service='generate-queue' ORDER BY created_at DESC LIMIT 6;"; echo ""

          echo ""
          echo "=== LAST 6 extract-contacts RUNS ==="
          q "SELECT created_at, message FROM error_log WHERE service='extract-contacts' ORDER BY created_at DESC LIMIT 6;"; echo ""

          echo ""
          echo "=== EXTRACT-CONTACTS BACKLOG (leads it should pick up) ==="
          q "SELECT count(*) AS matching FROM leads WHERE contact_email IS NULL AND contact_email_type IS NULL AND stage <> 'excluded';"; echo ""
          q "SELECT contact_email_type, count(*) FROM leads WHERE contact_email IS NULL GROUP BY 1 ORDER BY 2 DESC;"; echo ""

          echo ""
          echo "=== PROBE: extract-contacts direct invoke (runs the function live) ==="
          curl -s -m 150 -X POST \
            "https://lxsyrserfuighwxuymgb.supabase.co/functions/v1/extract-contacts" \
            -H "Content-Type: application/json" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4c3lyc2VyZnVpZ2h3eHV5bWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUwNDgsImV4cCI6MjA5MDUyMTA0OH0.6SgyPJZ_TKeKJoC_E4mIQhd373UMP8-K1VMSZJJacsM" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4c3lyc2VyZnVpZ2h3eHV5bWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDUwNDgsImV4cCI6MjA5MDUyMTA0OH0.6SgyPJZ_TKeKJoC_E4mIQhd373UMP8-K1VMSZJJacsM" \
            -d '{}' ; echo ""

          echo ""
          echo "=== NON-INFO ERRORS LAST 12H ==="
          q "SELECT created_at, service, level, left(message, 200) AS msg FROM error_log WHERE level <> 'info' AND created_at > now() - interval '12 hours' ORDER BY created_at DESC LIMIT 15;"; echo ""

          echo ""
          echo "=== CRON CADENCE: find-and-queue timestamps last 2h ==="
          q "SELECT created_at FROM error_log WHERE service='find-and-queue' AND created_at > now() - interval '2 hours' ORDER BY created_at DESC;"; echo ""

          echo ""
          echo "=== CRON CADENCE: process-queue timestamps last 1h ==="
          q "SELECT created_at FROM error_log WHERE service='process-queue' AND created_at > now() - interval '1 hour' ORDER BY created_at DESC;"; echo ""

          # ── Health verdict ────────────────────────────────────────────────
          FAIL=0
          if [ "$RESERVE" -lt "$MIN_RESERVE" ]; then
            echo "::warning::Contactable reserve $RESERVE is below threshold $MIN_RESERVE"
            FAIL=1
          fi
          if [ "$NEW1H" -lt "$MIN_NEW_LEADS_1H" ]; then
            echo "::warning::Pipeline may be stalled — only $NEW1H leads added in the last hour"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Pipeline health check FAILED — reserve=$RESERVE, new_leads_1h=$NEW1H, sent_today=$SENT"
            exit 1
          fi
          echo "✅ Healthy — reserve=$RESERVE, new_leads_1h=$NEW1H, sent_today=$SENT"
