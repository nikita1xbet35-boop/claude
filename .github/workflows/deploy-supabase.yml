name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'edge-functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Add brand column to search_presets if it doesn't exist yet + purge old custom presets
      - name: Run DB migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE public.search_presets ADD COLUMN IF NOT EXISTS brand TEXT DEFAULT NULL;"}' \
            && echo "Migration OK" || echo "Migration skipped (column may already exist)"
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"DELETE FROM public.search_presets WHERE is_default = false;"}' \
            && echo "Old custom presets cleared" || echo "Preset cleanup skipped"
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE public.leads ADD COLUMN IF NOT EXISTS found_keyword TEXT DEFAULT NULL;"}' \
            && echo "found_keyword column OK" || echo "found_keyword migration skipped (may already exist)"

      - name: Apply migration 002 (form channel)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/002_form_channel.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 002 OK" || echo "Migration 002 skipped (may already be applied)"

      - name: Apply migration 003 (SerpApi accounts)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/003_serpapi_accounts.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 003 OK" || echo "Migration 003 skipped (may already be applied)"

      - name: Apply migration 004 (source propagation)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/004_source_propagation.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 004 OK" || echo "Migration 004 skipped (may already be applied)"

      - name: Apply migration 005 (agent_log)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/005_agent_log.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 005 OK" || echo "Migration 005 skipped (may already be applied)"

      - name: Apply migration 006 (YouTube contacts)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/006_youtube_contacts.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 006 OK" || echo "Migration 006 skipped (may already be applied)"

      - name: Apply migration 007 (YouTube found_query)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/007_youtube_found_query.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 007 OK" || echo "Migration 007 skipped (may already be applied)"

      - name: Apply migration 008 (partner bases)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/008_partner_bases.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 008 OK" || echo "Migration 008 skipped (may already be applied)"

      - name: Apply migration 009 (seed 888starz base)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/009_seed_888starz.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 009 OK" || echo "Migration 009 skipped (may already be applied)"

      - name: Apply migration 010 (888starz template)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/010_888starz_template.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 010 OK" || echo "Migration 010 skipped (may already be applied)"

      - name: Apply migration 011 (email_log nullable lead_id)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/011_email_log_nullable_lead.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 011 OK" || echo "Migration 011 skipped (may already be applied)"

      - name: Apply migration 012 (YouTube cleanup <1000 subs + brand channels)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/012_youtube_cleanup.sql').read()}))")
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "Migration 012 OK" || echo "Migration 012 skipped (may already be applied)"

      - name: Apply migration 013 (seed luckypari_10_FTD base)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # This migration is ~2300 INSERT rows (~540KB) — too large to pass as a
          # curl -d command-line argument ("Argument list too long"). Write the
          # JSON payload to a file and stream it with --data-binary @file instead.
          python3 -c "import json; print(json.dumps({'query': open('supabase/migrations/013_luckypari_base.sql').read()}))" > /tmp/migration_013_payload.json
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/migration_013_payload.json \
            && echo "Migration 013 OK" || echo "Migration 013 skipped (may already be applied)"

      - name: Prepare function directories
        run: |
          mkdir -p supabase/functions/extract-contacts
          mkdir -p supabase/functions/generate-queue
          mkdir -p supabase/functions/process-queue
          mkdir -p supabase/functions/find-and-queue
          mkdir -p supabase/functions/send-email
          mkdir -p supabase/functions/send-email-outlook
          mkdir -p supabase/functions/process-queue-lp
          mkdir -p supabase/functions/admin-reset
          mkdir -p supabase/functions/find-contact-form
          mkdir -p supabase/functions/process-form-queue
          mkdir -p supabase/functions/process-partner-queue
          mkdir -p supabase/functions/find-youtube
          mkdir -p supabase/functions/youtube-search
          mkdir -p supabase/functions/find-appstore
          mkdir -p supabase/functions/watchdog-agent
          mkdir -p supabase/functions/check-limits
          mkdir -p supabase/functions/send-alert
          cp edge-functions/extract-contacts.ts    supabase/functions/extract-contacts/index.ts
          cp edge-functions/generate-queue.ts      supabase/functions/generate-queue/index.ts
          cp edge-functions/process-queue.ts       supabase/functions/process-queue/index.ts
          cp edge-functions/find-and-queue.ts      supabase/functions/find-and-queue/index.ts
          cp edge-functions/send-email.ts          supabase/functions/send-email/index.ts
          cp edge-functions/send-email-outlook.ts  supabase/functions/send-email-outlook/index.ts
          cp edge-functions/process-queue-lp.ts    supabase/functions/process-queue-lp/index.ts
          cp edge-functions/admin-reset.ts         supabase/functions/admin-reset/index.ts
          cp edge-functions/find-contact-form.ts   supabase/functions/find-contact-form/index.ts
          cp edge-functions/process-form-queue.ts  supabase/functions/process-form-queue/index.ts
          cp edge-functions/process-partner-queue.ts supabase/functions/process-partner-queue/index.ts
          cp edge-functions/find-youtube.ts        supabase/functions/find-youtube/index.ts
          cp edge-functions/youtube-search.ts      supabase/functions/youtube-search/index.ts
          cp edge-functions/find-appstore.ts       supabase/functions/find-appstore/index.ts
          cp edge-functions/watchdog-agent.ts      supabase/functions/watchdog-agent/index.ts
          cp edge-functions/check-limits.ts        supabase/functions/check-limits/index.ts
          cp edge-functions/send-alert.ts          supabase/functions/send-alert/index.ts

      - name: Deploy extract-contacts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy extract-contacts --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy generate-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy generate-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy process-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy process-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy find-and-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy find-and-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy send-email
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-email --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy send-email-outlook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-email-outlook --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy process-queue-lp
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy process-queue-lp --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy admin-reset
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy admin-reset --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy find-contact-form
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy find-contact-form --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy process-form-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy process-form-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy process-partner-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy process-partner-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy find-youtube
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy find-youtube --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy youtube-search
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy youtube-search --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy find-appstore
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy find-appstore --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy watchdog-agent
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy watchdog-agent --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      # check-limits + send-alert were never in the deploy pipeline, so the live
      # copies were stale (English "serpapi_1: Service paused" spam every 15 min).
      # The repo versions alert only on Gmail send-quota, in Russian, and never pause
      # the best-effort services (SerpApi self-heals via account rotation + DDG fallback).
      - name: Deploy check-limits
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy check-limits --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy send-alert
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-alert --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      # Arm the form channel. process-form-queue stays in DRY-RUN until this secret
      # is 'true'. To disable sending again, set it to 'false' here and redeploy.
      - name: Arm form sending (FORM_SENDING_ENABLED)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase secrets set FORM_SENDING_ENABLED=true --project-ref lxsyrserfuighwxuymgb

      # Arm the App Store source (Africa-focus week). find-appstore stays inert until
      # this secret is 'true'. To disable again, set it to 'false' here and redeploy.
      - name: Arm App Store source (APPSTORE_ENABLED)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase secrets set APPSTORE_ENABLED=true --project-ref lxsyrserfuighwxuymgb

      # SerpApi keys: pushed from GitHub Actions secrets into Supabase function
      # secrets (never committed to the repo). Skips cleanly if a secret is absent,
      # so find-and-queue stays DDG-only until the keys are provided.
      - name: Set optional API keys (SerpApi + extra Groq, from GitHub secrets)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SERPAPI_KEY_1: ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          GROQ_KEY_2: ${{ secrets.GROQ_KEY_2 }}
          GROQ_KEY_3: ${{ secrets.GROQ_KEY_3 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          ARGS=""
          [ -n "$SERPAPI_KEY_1" ] && ARGS="$ARGS SERPAPI_KEY_1=$SERPAPI_KEY_1"
          [ -n "$SERPAPI_KEY_2" ] && ARGS="$ARGS SERPAPI_KEY_2=$SERPAPI_KEY_2"
          [ -n "$SERPAPI_KEY_3" ] && ARGS="$ARGS SERPAPI_KEY_3=$SERPAPI_KEY_3"
          [ -n "$GROQ_KEY_2" ]    && ARGS="$ARGS GROQ_KEY_2=$GROQ_KEY_2"
          [ -n "$GROQ_KEY_3" ]    && ARGS="$ARGS GROQ_KEY_3=$GROQ_KEY_3"
          [ -n "$YOUTUBE_API_KEY" ] && ARGS="$ARGS YOUTUBE_API_KEY=$YOUTUBE_API_KEY"
          if [ -n "$ARGS" ]; then
            supabase secrets set $ARGS --project-ref lxsyrserfuighwxuymgb && echo "Optional API keys set"
          else
            echo "No optional API-key secrets present — skipping"
          fi

      - name: Reset system state via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cat > /tmp/reset.json <<'JSON'
          {"query":"UPDATE public.api_usage SET system_paused = false, paused = false, alert_sent_warning = false, alert_sent_critical = false; UPDATE public.api_usage SET limit_value = 300 WHERE service = 'gmail_main'; UPDATE public.api_usage SET limit_value = 100 WHERE service = 'gmail_lp'; UPDATE public.api_usage SET limit_value = 100 WHERE service = 'form_main'; UPDATE public.send_queue SET gmail_account = 'main' WHERE gmail_account = 'lp'; UPDATE public.send_queue SET status = 'pending', retry_count = 0, error = NULL WHERE status = 'failed'; UPDATE public.api_usage SET limit_value = 100000 WHERE service = 'serpapi'; UPDATE public.api_usage SET limit_value = 1000000 WHERE service = 'jina'; UPDATE public.send_queue SET status = 'pending', error = NULL WHERE error = 'luckypari brand disabled' AND status = 'skipped'; UPDATE public.send_queue SET status = 'pending', retry_count = 0, error = NULL, scheduled_at = now() WHERE status = 'skipped' AND error = 'Conflicting API keys'; UPDATE public.leads SET stage = 'excluded' WHERE contact_email ~* '@(yandex\\.(ru|com)|ya\\.ru|mail\\.ru|vk\\.com|ok\\.ru|rambler\\.ru|avito\\.ru|gosuslugi\\.ru|sberbank\\.ru|tinkoff\\.ru|wildberries\\.ru|ozon\\.ru|2gis\\.ru|rbc\\.ru|rt\\.com|ria\\.ru|tass\\.ru|google\\.com|apple\\.com|microsoft\\.com|samsung\\.com|huawei\\.com|xiaomi\\.com|baidu\\.com|aliexpress\\.com|wordpress\\.com|wix\\.com|shopify\\.com|cloudflare\\.com)$'; UPDATE public.leads SET stage = 'new' WHERE stage = 'excluded' AND contact_email ~* '@(gmail\\.com|googlemail\\.com|outlook\\.com|hotmail\\.com)$' AND NOT EXISTS (SELECT 1 FROM public.email_log e WHERE lower(e.email) = lower(leads.contact_email)); UPDATE public.send_queue sq SET status = 'skipped', error = 'corporate domain (not an affiliate)' FROM public.leads l WHERE sq.lead_id = l.id AND sq.status = 'pending' AND l.stage = 'excluded' AND sq.error IS DISTINCT FROM 'corporate domain (not an affiliate)'; UPDATE public.lp_outreach SET status = 'pending', error = NULL, retry_count = 0, scheduled_at = now() WHERE status = 'failed' OR (status = 'skipped' AND error NOT ILIKE '%bad email%' AND error NOT ILIKE '%already sent by LP%');"}
          JSON
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/reset.json \
            && echo "System unpaused + counters reset" || echo "Reset call failed (non-fatal)"
