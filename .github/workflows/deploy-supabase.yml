name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'edge-functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare function directories
        run: |
          mkdir -p supabase/functions/extract-contacts
          mkdir -p supabase/functions/generate-queue
          mkdir -p supabase/functions/process-queue
          mkdir -p supabase/functions/cron-search
          cp edge-functions/extract-contacts.ts supabase/functions/extract-contacts/index.ts
          cp edge-functions/generate-queue.ts   supabase/functions/generate-queue/index.ts
          cp edge-functions/process-queue.ts    supabase/functions/process-queue/index.ts
          cp edge-functions/cron-search.ts      supabase/functions/cron-search/index.ts

      - name: Deploy extract-contacts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy extract-contacts \
            --project-ref lxsyrserfuighwxuymgb \
            --no-verify-jwt

      - name: Deploy generate-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy generate-queue \
            --project-ref lxsyrserfuighwxuymgb \
            --no-verify-jwt

      - name: Deploy process-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy process-queue \
            --project-ref lxsyrserfuighwxuymgb \
            --no-verify-jwt

      - name: Deploy cron-search
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy cron-search \
            --project-ref lxsyrserfuighwxuymgb \
            --no-verify-jwt
