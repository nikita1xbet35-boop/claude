name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'edge-functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Add brand column to search_presets if it doesn't exist yet
      - name: Run DB migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE public.search_presets ADD COLUMN IF NOT EXISTS brand TEXT DEFAULT NULL;"}' \
            && echo "Migration OK" || echo "Migration skipped (column may already exist)"

      - name: Prepare function directories
        run: |
          mkdir -p supabase/functions/extract-contacts
          mkdir -p supabase/functions/generate-queue
          mkdir -p supabase/functions/process-queue
          mkdir -p supabase/functions/find-and-queue
          mkdir -p supabase/functions/send-email
          mkdir -p supabase/functions/admin-reset
          cp edge-functions/extract-contacts.ts supabase/functions/extract-contacts/index.ts
          cp edge-functions/generate-queue.ts   supabase/functions/generate-queue/index.ts
          cp edge-functions/process-queue.ts    supabase/functions/process-queue/index.ts
          cp edge-functions/find-and-queue.ts   supabase/functions/find-and-queue/index.ts
          cp edge-functions/send-email.ts       supabase/functions/send-email/index.ts
          cp edge-functions/admin-reset.ts      supabase/functions/admin-reset/index.ts

      - name: Deploy extract-contacts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy extract-contacts --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy generate-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy generate-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy process-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy process-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy find-and-queue
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy find-and-queue --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy send-email
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy send-email --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Deploy admin-reset
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy admin-reset --project-ref lxsyrserfuighwxuymgb --no-verify-jwt

      - name: Reset system state via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cat > /tmp/reset.json <<'JSON'
          {"query":"UPDATE public.api_usage SET system_paused = false, paused = false WHERE service IN ('gmail_main','gmail_lp'); UPDATE public.send_queue SET gmail_account = 'main' WHERE gmail_account = 'lp'; UPDATE public.send_queue SET status = 'pending', retry_count = 0, error = NULL WHERE status = 'failed';"}
          JSON
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/lxsyrserfuighwxuymgb/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/reset.json \
            && echo "System unpaused + failed items requeued" || echo "Reset call failed (non-fatal)"
